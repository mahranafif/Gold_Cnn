name: Train CNN Models

on:
  workflow_dispatch:
  push:
    paths:
      - "dataset/**"
      - "scripts/train_gold_poster_classifier.py"
      - "scripts/train_layout_classifier.py"

permissions:
  contents: write

jobs:
  train-models:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision pillow

      - name: Train gold poster classifier
        run: python scripts/train_gold_poster_classifier.py

      - name: Train layout classifier
        run: python scripts/train_layout_classifier.py

      - name: Commit trained models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add models

          if git diff --cached --quiet; then
            echo "No model changes to commit"
            exit 0
          fi

          git commit -m "Update CNN models"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
